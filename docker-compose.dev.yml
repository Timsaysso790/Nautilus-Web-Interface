services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      SECRET_KEY: "${SECRET_KEY:-dev-secret-key-CHANGE-IN-PRODUCTION-min-32-chars}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5173}"
      API_KEY: "${API_KEY:-}"
      NAUTILUS_API_PORT: "8000"
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-200}"
      LOGIN_RATE_LIMIT_PER_MINUTE: "${LOGIN_RATE_LIMIT_PER_MINUTE:-5}"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: ["uvicorn", "nautilus_fastapi:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

  admin_db_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${ADMIN_PORT:-8001}:8001"
    environment:
      ADMIN_DB_API_PORT: "8001"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5173}"
      DB_PATH: "/app/data/admin_panel.db"
      ADMIN_API_KEY: "${ADMIN_API_KEY:-}"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: ["python3", "admin_db_api.py"]
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - CHOKIDAR_USEPOLLING=1
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    restart: unless-stopped

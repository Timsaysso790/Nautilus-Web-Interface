services:
  backend:
    container_name: nautilus-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${NAUTILUS_API_PORT:-8000}:8000"
    environment:
      SECRET_KEY: "${SECRET_KEY:-dev-secret-key-CHANGE-IN-PRODUCTION-min-32-chars}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      NAUTILUS_API_PORT: "8000"
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-200}"
      LOGIN_RATE_LIMIT_PER_MINUTE: "${LOGIN_RATE_LIMIT_PER_MINUTE:-5}"
      THETADATA_API_KEY: "${THETADATA_API_KEY:-}"
      FRED_API_KEY: "${FRED_API_KEY:-}"
      # Container-internal paths — these match the volume mounts below.
      # Only set ARCHIVE_PATH (volume mount) in your .env, not these.
      OPTIONS_ARCHIVE_PATH: "/data/archive/Nautilus_Archive5min"
      EQUITY_ARCHIVE_PATH: "/data/archive/Equity_Archive"
      SCANNER_OUTPUT_PATH: "/data/scanner/.mcp_scanner_output.json"
      PROJECTS_ROOT: "/app/data/projects"
    volumes:
      - "${NAUTILUS_DATA_DIR:-./data}/backend:/app/data"
      - "${NAUTILUS_CATALOG_PATH:-./data_lake}:/app/catalog"
      - "${ARCHIVE_PATH:-./archive}:/data/archive"
      - "${SCANNER_DATA_DIR:-./scanner_data}:/data/scanner"
    restart: unless-stopped
    mem_limit: 1g
    cpus: "2.0"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nautilus-net

  frontend:
    container_name: nautilus-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${NAUTILUS_WEB_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 64m
    cpus: "0.25"
    networks:
      - nautilus-net

networks:
  nautilus-net:
    driver: bridge
